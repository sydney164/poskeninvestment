<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POSKEN Investment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#0b3d2e;
--accent:#c49a3a;
--light:#f5f7f6;
--dark:#222;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;line-height:1.6;color:var(--dark)}

section{padding:80px 20px}
.container{max-width:1200px;margin:auto}

/* HEADER */
header{
background:var(--primary);
position:sticky;top:0;z-index:1000;
}
nav{
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;
}
.logo{color:#fff;font-weight:700;font-size:22px}
nav ul{display:flex;list-style:none}
nav ul li{margin-left:20px}
nav ul li a{color:#fff;text-decoration:none;font-size:14px}
.hamburger{display:none;cursor:pointer}
.hamburger div{width:25px;height:3px;background:#fff;margin:4px}

/* HERO */
.hero{
position:relative;height:100vh;overflow:hidden;
}
.hero-slide{
position:absolute;width:100%;height:100%;
background-size:cover;background-position:center;
opacity:0;transition:1.5s;
}
.hero-slide.active{opacity:1}
.hero::after{
content:"";position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.6);
}
.hero-content{
position:relative;z-index:2;color:#fff;
top:50%;transform:translateY(-50%);
max-width:600px;padding:20px;
}
.hero h2{font-size:48px;margin-bottom:15px}
.hero p{margin-bottom:20px}
.btn{
background:var(--accent);
padding:12px 25px;
color:#fff;text-decoration:none;
border-radius:5px;
}

/* SERVICES */
.services{background:var(--light)}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}
.card{
position:relative;height:320px;
border-radius:15px;overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
animation:zoom 6s infinite alternate;
}
.card img{
width:100%;height:100%;object-fit:cover;
transition:.6s;
}
.card:hover img{transform:scale(1.2)}
.card-content{
position:absolute;bottom:0;color:#fff;
padding:20px;width:100%;
background:linear-gradient(transparent,rgba(0,0,0,.8));
}

/* ZOOM */
@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.05)}
}

/* TIMBER */
.slider-wrap{position:relative}
.slider{
display:flex;gap:20px;overflow:hidden;
}
.timber{
min-width:250px;background:#fff;
border-radius:10px;overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}
.timber img{width:100%;height:180px;object-fit:cover}
.timber h3{text-align:center;padding:10px}
.nav{
position:absolute;top:50%;transform:translateY(-50%);
background:var(--primary);color:#fff;border:none;
padding:10px;border-radius:50%;cursor:pointer;
}
.left{left:-10px}.right{right:-10px}

/* STATS */
.stats{
background:var(--primary);color:#fff;
display:flex;justify-content:space-around;
flex-wrap:wrap;text-align:center;
}
.stats div{margin:20px}
.stats h3{font-size:40px}

/* FOOTER */
footer{
background:var(--primary);color:#fff;
text-align:center;padding:20px;
}

/* RESPONSIVE */
@media(max-width:900px){
nav ul{display:none;flex-direction:column}
nav ul.active{display:flex;background:var(--primary);padding:10px}
.hamburger{display:block}
.hero h2{font-size:32px}
}
</style>
</head>

<body>

<header>
<nav>
<div class="logo">POSKEN</div>

<div class="hamburger" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<ul id="menu">
<li><a href="#">Home</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#timber">Timber</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section class="hero">

<div class="hero-slide active" style="background-image:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e')"></div>
<div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1513828583688-c52646db42da')"></div>

<div class="hero-content container">
<h2 id="title">Reliable Timber Solutions</h2>
<p id="text">High-quality timber supply across Zambia</p>
<a href="#" class="btn">Get Started</a>
</div>

</section>

<!-- SERVICES -->
<section id="services" class="services">
<div class="container">
<h2 class="section-title">Our Services</h2>

<div class="grid">
<div class="card">
<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
<div class="card-content"><h3>Timber Supply</h3></div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758">
<div class="card-content"><h3>Hardware</h3></div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
<div class="card-content"><h3>Transport</h3></div>
</div>
</div>
</div>
</section>

<!-- TIMBER -->
<section id="timber">
<div class="container">
<h2>Types of Timber</h2>

<div class="slider-wrap">
<button class="nav left" onclick="left()">❮</button>

<div class="slider" id="slider">
<div class="timber"><img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e"><h3>Pine</h3></div>
<div class="timber"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c"><h3>Hardwood</h3></div>
<div class="timber"><img src="https://images.unsplash.com/photo-1599493758267-c6c884c7071f"><h3>Teak</h3></div>
<div class="timber"><img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed"><h3>Mahogany</h3></div>
</div>

<button class="nav right" onclick="right()">❯</button>
</div>

</div>
</section>

<!-- STATS -->
<section class="stats">
<div><h3 id="c1">0</h3><p>Projects</p></div>
<div><h3 id="c2">0</h3><p>Clients</p></div>
<div><h3 id="c3">0</h3><p>Years</p></div>
</section>

<footer>
<p>© 2026 POSKEN Investment</p>
</footer>

<script>
// MENU
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

// HERO
let slides=document.querySelectorAll(".hero-slide");
let titles=["Reliable Timber Solutions","Quality Hardware"];
let texts=["High-quality timber supply","All building materials"];
let i=0;
setInterval(()=>{
slides.forEach(s=>s.classList.remove("active"));
i++;if(i>=slides.length)i=0;
slides[i].classList.add("active");
title.innerText=titles[i];
text.innerText=texts[i];
},5000);

// SLIDER
const s=document.getElementById("slider");
function left(){s.scrollBy({left:-300,behavior:"smooth"})}
function right(){s.scrollBy({left:300,behavior:"smooth"})}

// COUNTERS
function count(id,max){
let el=document.getElementById(id),i=0;
let int=setInterval(()=>{
i++;el.innerText=i;
if(i>=max)clearInterval(int);
},20);
}
count("c1",120);count("c2",80);count("c3",10);
</script>

</body>
</html>
