<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POSKEN Investment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif}

/* HEADER */
header{
  background:#0b3d2e;
  position:sticky;
  top:0;
  z-index:1000;
}
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
}
nav h1{color:#fff}
nav ul{
  display:flex;
  list-style:none;
}
nav ul li{margin-left:20px}
nav ul li a{color:#fff;text-decoration:none}
.hamburger{display:none;cursor:pointer}
.hamburger div{width:25px;height:3px;background:#fff;margin:5px}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}
.hero-slide{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:1.5s;
}
.hero-slide.active{opacity:1}
.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
}
.hero-content{
  position:relative;
  z-index:2;
  color:#fff;
  top:50%;
  transform:translateY(-50%);
  padding:0 40px;
}
.hero h2{font-size:50px;margin-bottom:10px}
.btn{background:#c49a3a;padding:10px 20px;color:#fff;text-decoration:none}

/* SERVICES */
.services-section{padding:80px 40px;background:#f9f9f9}
.section-title{text-align:center;margin-bottom:40px;color:#0b3d2e}
.services-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
}
.service-card{
  height:350px;
  overflow:hidden;
  border-radius:15px;
  position:relative;
  animation:zoomSlow 6s infinite alternate;
}
.service-img{
  width:100%;height:100%;
  background-size:cover;
  transition:.6s;
}
.service-card:hover .service-img{transform:scale(1.2)}
.service-content{
  position:absolute;
  bottom:0;
  color:#fff;
  padding:20px;
  background:linear-gradient(transparent,black);
}

/* ZOOM */
@keyframes zoomSlow{
  from{transform:scale(1)}
  to{transform:scale(1.05)}
}

/* TIMBER */
.timber-section{padding:80px 40px}
.timber-wrapper{position:relative;display:flex;align-items:center}
.timber-slider{
  display:flex;
  overflow:hidden;
  gap:20px;
  scroll-behavior:smooth;
}
.timber-card{
  min-width:250px;
  background:#f9f9f9;
  border-radius:10px;
  overflow:hidden;
}
.timber-card img{width:100%;height:180px;object-fit:cover}
.timber-card h3{text-align:center;padding:10px}
.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#0b3d2e;
  color:#fff;
  border:none;
  padding:10px;
  cursor:pointer;
}
.left{left:-10px}
.right{right:-10px}

/* RESPONSIVE */
@media(max-width:900px){
  nav ul{display:none;flex-direction:column}
  nav ul.active{display:flex}
  .hamburger{display:block}
}
</style>
</head>

<body>

<header>
<nav>
<h1>POSKEN</h1>

<div class="hamburger" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<ul id="menu">
<li><a href="#">Home</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#timber">Timber</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section class="hero">

<div class="hero-slide active" style="background-image:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e')"></div>
<div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1513828583688-c52646db42da')"></div>
<div class="hero-slide" style="background-image:url('https://images.unsplash.com/photo-1473448912268-2022ce9509d8')"></div>

<div class="hero-content">
<h2 id="title">Reliable Timber Solutions</h2>
<p id="text">High-quality timber supply across Zambia</p>
<a href="#" class="btn">Get Started</a>
</div>

</section>

<!-- SERVICES -->
<section id="services" class="services-section">
<h2 class="section-title">Our Services</h2>

<div class="services-grid">

<div class="service-card">
<div class="service-img" style="background-image:url('https://images.unsplash.com/photo-1503387762-592deb58ef4e')"></div>
<div class="service-content"><h3>Timber Supply</h3></div>
</div>

<div class="service-card">
<div class="service-img" style="background-image:url('https://images.unsplash.com/photo-1581092160607-ee22621dd758')"></div>
<div class="service-content"><h3>Hardware</h3></div>
</div>

<div class="service-card">
<div class="service-img" style="background-image:url('https://images.unsplash.com/photo-1502877338535-766e1452684a')"></div>
<div class="service-content"><h3>Transport</h3></div>
</div>

</div>
</section>

<!-- TIMBER -->
<section id="timber" class="timber-section">
<h2 class="section-title">Types of Timber</h2>

<div class="timber-wrapper">
<button class="nav-btn left" onclick="left()">❮</button>

<div class="timber-slider" id="slider">
<div class="timber-card"><img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e"><h3>Pine</h3></div>
<div class="timber-card"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c"><h3>Hardwood</h3></div>
<div class="timber-card"><img src="https://images.unsplash.com/photo-1599493758267-c6c884c7071f"><h3>Teak</h3></div>
<div class="timber-card"><img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed"><h3>Mahogany</h3></div>
</div>

<button class="nav-btn right" onclick="right()">❯</button>
</div>
</section>

<script>
// MENU
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

// HERO SLIDER
let slides=document.querySelectorAll(".hero-slide");
let titles=["Reliable Timber Solutions","Quality Hardware","Transport Services"];
let texts=["High-quality timber supply","All building materials","Fast logistics"];

let i=0;
setInterval(()=>{
slides.forEach(s=>s.classList.remove("active"));
i++; if(i>=slides.length)i=0;
slides[i].classList.add("active");
document.getElementById("title").innerText=titles[i];
document.getElementById("text").innerText=texts[i];
},5000);

// TIMBER SLIDER
const s=document.getElementById("slider");
function left(){s.scrollBy({left:-300,behavior:"smooth"})}
function right(){s.scrollBy({left:300,behavior:"smooth"})}
</script>

</body>
</html>
